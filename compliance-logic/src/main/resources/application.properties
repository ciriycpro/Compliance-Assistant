spring.application.name=compliance-logic
server.port=${SERVER_PORT:8771}
server.address=${SERVER_ADDRESS:127.0.0.1}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:compliance}
spring.datasource.username=${POSTGRES_USER:compliance_app}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.root=INFO
logging.level.ru.ciriycpro.compliance=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.liquibase=INFO

api.key=${API_KEY}

# Hibernate Envers (DEC-017 Уровень 1 — audit trail)
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
spring.jpa.properties.org.hibernate.envers.do_not_audit_optimistic_locking_field=true

# TLS/mTLS (DEC-017 Уровень 1 — internal network защита)
# Mode: want — клиент может предоставить cert, но не обязан (fallback на API-key)
# Future: client-auth=need когда orchestrator подключит mTLS
server.ssl.enabled=true
server.ssl.key-store=/etc/compliance-tls/compliance-logic/compliance-logic.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-alias=compliance-logic
server.ssl.trust-store=/etc/compliance-tls/compliance-logic/compliance-truststore.p12
server.ssl.trust-store-type=PKCS12
server.ssl.trust-store-password=${SSL_TRUSTSTORE_PASSWORD:changeit}
server.ssl.client-auth=want
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# Inspector Scheduler (DEC-023 v1.0)
inspector.statement-gaps.cron=0 0 10 * * *
inspector.enabled=true
